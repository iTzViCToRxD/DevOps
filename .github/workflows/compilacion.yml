name: Compilacion DevOps

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'DevOps/**'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'DevOps/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Limpiar Workspace
        run: |
          Remove-Item "$env:GITHUB_WORKSPACE\*" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Descargar Repositorio
        uses: actions/checkout@v4

      - name: Compilacion Docker
        shell: powershell
        run: |
          docker build --target publish-artifacts --output type=local,dest=.\publish .

      - name: Compresion de Publicacion
        shell: powershell
        run: |
            $publishPath = Resolve-Path .\publish
            $zipPath = Join-Path (Get-Location) "artefacto.zip"
            $stagingPath = Join-Path $env:RUNNER_TEMP "publish-staging"
            $maxRetries = 8
        
            for ($i = 1; $i -le $maxRetries; $i++) {
              try {
                if (Test-Path $zipPath) {
                  Remove-Item $zipPath -Force
                }
        
                if (Test-Path $stagingPath) {
                  Remove-Item $stagingPath -Recurse -Force
                }
        
                New-Item -ItemType Directory -Path $stagingPath | Out-Null
        
                # Copiamos primero a staging para evitar bloqueos transitorios en ./publish
                Copy-Item -Path (Join-Path $publishPath "*") -Destination $stagingPath -Recurse -Force -ErrorAction Stop
                Copy-Item .\Dockerfile -Destination $stagingPath -Recurse -Force -ErrorAction Stop
        
                Compress-Archive -Path (Join-Path $stagingPath "*") -DestinationPath $zipPath -CompressionLevel Optimal -Force -ErrorAction Stop
                Write-Host "Compresion completada en intento $i."
                break
              }
              catch {
                if ($i -eq $maxRetries) { throw }
                Write-Host "Intento $i fallido por bloqueo de archivos. Reintentando..."
                Start-Sleep -Seconds 3
              }
            }

      - name: Subir Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: ./artefacto.zip
