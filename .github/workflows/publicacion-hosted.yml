name: Publicacion Imagen - Hosted

on:
  workflow_run:
    workflows: [Compilacion DevOps - Hosted]
    types: [completed]
    branches: [main, dev]

  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  Publicacion:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')

    runs-on: ubuntu-latest

    steps:
    
      - name: Descargar Artefacto
        uses: actions/download-artifact@v4
        with:
          name: app-package
          path: descarga
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Extraer artefactos
        run: |
          mkdir -p extraido
          unzip ./descarga/artefacto.zip -d ./extraido

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Crear Imagen
        uses: docker/build-push-action@v6
        with:
          context: ./extraido
          file: ./extraido/Dockerfile
          target: runtime
          tags: itzvictorxd/devops-api:1.0
          load: true

      - name: Publicar Imagen
        uses: docker/build-push-action@v6
        with:
          context: ./extraido
          file: ./extraido/Dockerfile
          target: runtime
          tags: itzvictorxd/devops-api:1.0
          push: true
